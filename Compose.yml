name: prj-asa
services:
  site-01:
    build:
      context: .
      dockerfile: Dockerfile
    image: asa3
    ports:
      - '80:80'
    volumes:
      - ./ASA2026.1:/user/share/nginx/html
    networks:
      - my net


  site-02:
    build:
      context: .
      dockerfile: Dockerfile
    image: asa3
    ports:
      - '81:80'
    volumes:
      - ./ASA2026.1:/user/share/nginx/html
    networks:
      - my net

networks:
  my-net:
      driver: bridge